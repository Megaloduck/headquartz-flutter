name: headquartz
description: "Headquartz — LAN multiplayer ERP simulation for desktop."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1

  # Routing
  go_router: ^17.2.3

  # DI
  get_it: ^9.2.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Networking
  #bonsoir: ^5.1.10

  # UI / Desktop
  fl_chart: ^1.2.0
  window_manager: ^0.5.1

  # Utility
  logger: ^2.4.0
  uuid: ^4.5.1
  collection: ^1.19.0
  intl: ^0.20.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/